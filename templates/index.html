<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vulnerability Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Hide spinner initially */
#loadingSpinner{
  display:none;
}
</style>
</head>

<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-4">

  <!-- Title -->
  <h1 class="text-center text-3xl md:text-4xl font-extrabold mb-8
             text-red-600 drop-shadow-md">
 Vulnerability Scanner
  </h1>

  <!-- Card -->
  <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-xl">

    <form method="POST" onsubmit="showSpinner()" class="space-y-4">

      <input
        type="text"
        name="url"
        placeholder="Enter target URL"
        required
        class="w-full px-4 py-3 border border-slate-300 rounded-lg
               outline-none focus:ring-2 focus:ring-red-400"
      >

      <button
        type="submit"
        class="w-full py-3 font-bold uppercase rounded-lg
               bg-red-600 text-white
               hover:bg-red-700 shadow-md transition">
        Scan Target
      </button>

    </form>

    <!-- Spinner -->
    <div id="loadingSpinner" class="mt-6 text-center">

      <div class="flex justify-center">
        <div class="w-12 h-12 border-4 border-slate-200
                    border-t-red-500 rounded-full animate-spin">
        </div>
      </div>

      <p class="mt-3 text-slate-600 font-medium">
        Scanning target... please wait
      </p>

    </div>

  </div>
</div>

<script>

/* Show spinner on submit */
function showSpinner(){
  document.getElementById('loadingSpinner').style.display = 'block';
}

</script>

</body>
</html>
